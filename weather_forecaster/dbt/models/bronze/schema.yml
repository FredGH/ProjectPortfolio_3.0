version: 2

sources:
  - name: bronze
    description: "Raw weather data loaded from the OpenWeather Free API 2.5 via the extraction pipeline."
    schema: staging
    tables:
      - name: current_weather
        description: "One row per location per pipeline run — current weather conditions."
        columns:
          - name: lat
            description: "Latitude."
            tests: [not_null]
          - name: lon
            description: "Longitude."
            tests: [not_null]
          - name: name
            description: "City name returned by the API."
          - name: sys_country
            description: "ISO 2-letter country code."
          - name: timezone
            description: "UTC offset in seconds."
          - name: dt
            description: "Unix timestamp of the observation."
          - name: _fetched_at
            description: "Pipeline fetch timestamp."
            tests: [not_null]
          - name: main_temp
            description: "Air temperature."
          - name: main_feels_like
            description: "Feels-like temperature."
          - name: main_temp_min
            description: "Minimum temperature."
          - name: main_temp_max
            description: "Maximum temperature."
          - name: main_pressure
            description: "Atmospheric pressure in hPa."
          - name: main_humidity
            description: "Relative humidity percentage."
          - name: visibility
            description: "Visibility in metres."
          - name: wind_speed
            description: "Wind speed in m/s."
          - name: wind_deg
            description: "Wind direction in degrees."
          - name: clouds_all
            description: "Cloud cover percentage."
          - name: sys_sunrise
            description: "Unix timestamp of sunrise."
          - name: sys_sunset
            description: "Unix timestamp of sunset."
      - name: weather_forecast
        description: "3-hour forecast intervals for the next 5 days."
        columns:
          - name: lat
            description: "Latitude."
            tests: [not_null]
          - name: lon
            description: "Longitude."
            tests: [not_null]
          - name: dt
            description: "Unix timestamp of the forecast interval."
            tests: [not_null]
          - name: dt_txt
            description: "Human-readable forecast interval timestamp."
          - name: main_temp
            description: "Forecast air temperature."
          - name: main_feels_like
            description: "Forecast feels-like temperature."
          - name: main_humidity
            description: "Forecast relative humidity percentage."
          - name: main_pressure
            description: "Forecast atmospheric pressure in hPa."
          - name: wind_speed
            description: "Forecast wind speed in m/s."
          - name: wind_deg
            description: "Forecast wind direction in degrees."
          - name: clouds_all
            description: "Forecast cloud cover percentage."
          - name: _fetched_at
            description: "Pipeline fetch timestamp."
      - name: geocoding
        description: "Forward geocoding results (city name → coordinates)."
        columns:
          - name: name
            description: "City name."
          - name: country
            description: "ISO 2-letter country code."
          - name: state
            description: "State or region name."
          - name: lat
            description: "Latitude."
          - name: lon
            description: "Longitude."
          - name: _fetched_at
            description: "Pipeline fetch timestamp."
      - name: reverse_geocoding
        description: "Reverse geocoding results (coordinates → place name)."
      - name: world_capitals
        description: "World capitals reference data loaded from data/world_capitals.json."
      - name: historical_weather_monthly
        description: "Monthly historical weather aggregates from Open-Meteo Archive API (2020-present)."
        columns:
          - name: city
            tests: [not_null]
          - name: country_code
            tests: [not_null]
          - name: year
            tests: [not_null]
          - name: month
            tests: [not_null]
        columns:
          - name: city
            description: "Capital city name."
            tests: [not_null]
          - name: country
            description: "Country name."
            tests: [not_null]
          - name: country_code
            description: "ISO 2-letter country code."
            tests: [not_null, unique]
          - name: lat
            description: "Latitude."
            tests: [not_null]
          - name: lon
            description: "Longitude."
            tests: [not_null]

models:
  - name: stg_current_weather
    description: "Cleaned and typed current weather observations from bronze."
    columns:
      - name: lat
        tests: [not_null]
      - name: lon
        tests: [not_null]
      - name: observed_at
        tests: [not_null]
      - name: temp_c
        tests: [not_null]

  - name: stg_weather_forecast
    description: "Cleaned and typed 3-hour forecast intervals from bronze."
    columns:
      - name: lat
        tests: [not_null]
      - name: lon
        tests: [not_null]
      - name: forecast_at
        tests: [not_null]

  - name: stg_geocoding
    description: "Cleaned geocoding results (city name → coordinates)."
    columns:
      - name: lat
        tests: [not_null]
      - name: lon
        tests: [not_null]

  - name: stg_historical_weather
    description: "Cleaned historical monthly weather from Open-Meteo Archive API."
    columns:
      - name: city
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: month
        tests: [not_null]

  - name: stg_world_capitals
    description: "World capitals reference — one row per country capital."
    columns:
      - name: country_code
        tests: [not_null, unique]
      - name: lat
        tests: [not_null]
      - name: lon
        tests: [not_null]
