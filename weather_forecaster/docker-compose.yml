services:

  # ─────────────────────────────────────────────────────────────────────────
  # Run the unit test suite (no API key required)
  # Usage: docker compose run --rm test
  # ─────────────────────────────────────────────────────────────────────────
  test:
    build:
      context: .
      target: test
    container_name: weather-forecaster-test
    restart: "no"

  # ─────────────────────────────────────────────────────────────────────────
  # Run the ETL pipeline — incremental mode by default
  # Usage:
  #   docker compose run --rm pipeline                   (incremental)
  #   docker compose run --rm pipeline python weather_forecaster_sources/pipeline_runner.py full
  # ─────────────────────────────────────────────────────────────────────────
  pipeline:
    build:
      context: .
      target: production
    container_name: weather-forecaster-pipeline
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: "no"

networks:
  default:
    name: weather-forecaster-network
